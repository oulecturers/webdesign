<!DOCTYPE html>
<!--
  ============================================================
  2.4.5 — CĂN CHỈNH ĐỐI TƯỢNG (object-fit & object-position)
  Cùng một ảnh nhồi vào ô 200×130 cố định: so sánh
  fill / contain / cover / none / scale-down + object-position.
  ============================================================
-->
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2.4.5 · object-fit</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 0 auto; padding: 16px; line-height: 1.6; }
    h1, h2 { color:#1D559F; }
    .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap:16px; }
    figure { margin:0; text-align:center; }
    /* Ô chứa CỐ ĐỊNH 200×130 để thấy rõ cách ảnh lấp vào */
    figure img { width:200px; height:130px; border:2px solid #1D559F; background:#eee; }
    figcaption { font-size:.82rem; color:#555; margin-top:4px; }

    .fill       { object-fit: fill; }
    .contain    { object-fit: contain; }
    .cover      { object-fit: cover; }
    .none       { object-fit: none; }
    .scaledown  { object-fit: scale-down; }
    .cover-pos  { object-fit: cover; object-position: top left; }
  </style>
</head>
<body>
  <h1>object-fit &amp; object-position</h1>
  <p>Cùng một ảnh, cùng ô chứa <strong>200×130</strong>:</p>

  <div class="grid">
    <figure><img class="fill" src="../assets/rose.svg" alt="fill"><figcaption>fill (mặc định — méo)</figcaption></figure>
    <figure><img class="contain" src="../assets/rose.svg" alt="contain"><figcaption>contain (đủ ảnh, có viền)</figcaption></figure>
    <figure><img class="cover" src="../assets/rose.svg" alt="cover"><figcaption>cover (lấp đầy, cắt bớt)</figcaption></figure>
    <figure><img class="none" src="../assets/rose.svg" alt="none"><figcaption>none (kích thước gốc)</figcaption></figure>
    <figure><img class="scaledown" src="../assets/rose.svg" alt="scale-down"><figcaption>scale-down</figcaption></figure>
    <figure><img class="cover-pos" src="../assets/rose.svg" alt="cover top-left"><figcaption>cover + object-position: top left</figcaption></figure>
  </div>

  <p style="background:#e3f2fd;border-left:4px solid #1D559F;padding:10px 14px;">
    <code>object-fit: cover</code> là "cứu tinh" cho lưới thumbnail đồng đều: ảnh khác tỷ lệ
    vẫn lấp đầy ô mà không méo (chỉ cắt phần thừa).</p>
</body>
</html>
