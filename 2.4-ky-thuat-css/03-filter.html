<!DOCTYPE html>
<!--
  ============================================================
  2.4.3 — BỘ LỌC HÌNH ẢNH (filter)
  blur / brightness / contrast / grayscale / sepia / hue-rotate /
  invert / saturate / drop-shadow, và xếp chồng nhiều filter.
  ============================================================
-->
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2.4.3 · Filter</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 0 auto; padding: 16px; line-height: 1.6; }
    h1 { color:#1D559F; }
    .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap:14px; }
    figure { margin:0; text-align:center; }
    figure img { width:100%; height:110px; object-fit:cover; border-radius:6px; }
    figcaption { font-size:.8rem; color:#555; margin-top:4px; }

    .blur       { filter: blur(3px); }
    .brightness { filter: brightness(150%); }
    .contrast   { filter: contrast(180%); }
    .grayscale  { filter: grayscale(100%); }
    .sepia      { filter: sepia(100%); }
    .hue        { filter: hue-rotate(120deg); }
    .invert     { filter: invert(100%); }
    .saturate   { filter: saturate(300%); }
    .shadow     { filter: drop-shadow(4px 4px 6px rgba(0,0,0,.5)); }
    .combo      { filter: hue-rotate(-40deg) brightness(120%) contrast(120%); }  /* xếp chồng */
  </style>
</head>
<body>
  <h1>Bộ lọc hình ảnh (filter)</h1>
  <p>Cùng một ảnh gốc, áp các filter khác nhau. Có thể <strong>xếp chồng nhiều hàm</strong> (ô cuối).</p>

  <div class="grid">
    <figure><img src="../assets/rose.svg" alt="gốc"><figcaption>gốc (không filter)</figcaption></figure>
    <figure><img class="blur" src="../assets/rose.svg" alt="blur"><figcaption>blur(3px)</figcaption></figure>
    <figure><img class="brightness" src="../assets/rose.svg" alt="brightness"><figcaption>brightness(150%)</figcaption></figure>
    <figure><img class="contrast" src="../assets/rose.svg" alt="contrast"><figcaption>contrast(180%)</figcaption></figure>
    <figure><img class="grayscale" src="../assets/rose.svg" alt="grayscale"><figcaption>grayscale(100%)</figcaption></figure>
    <figure><img class="sepia" src="../assets/rose.svg" alt="sepia"><figcaption>sepia(100%)</figcaption></figure>
    <figure><img class="hue" src="../assets/rose.svg" alt="hue"><figcaption>hue-rotate(120deg)</figcaption></figure>
    <figure><img class="invert" src="../assets/rose.svg" alt="invert"><figcaption>invert(100%)</figcaption></figure>
    <figure><img class="saturate" src="../assets/rose.svg" alt="saturate"><figcaption>saturate(300%)</figcaption></figure>
    <figure><img class="shadow" src="../assets/rose.svg" alt="shadow"><figcaption>drop-shadow()</figcaption></figure>
    <figure><img class="combo" src="../assets/rose.svg" alt="combo"><figcaption>xếp chồng 3 filter</figcaption></figure>
  </div>
</body>
</html>
